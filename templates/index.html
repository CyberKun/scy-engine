<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scy · MCTS Go Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════ */
:root {
  --bg:      #222831;
  --panel:   #2C3440;
  --surface: #353F4D;
  --goban:   #D4A843;
  --warm:    #CF5C36;
  --cool:    #3F88A8;
  --text:    #C9D1D9;
  --muted:   #7D8590;
  --dim:     #4D5666;
  --border:  #3A4250;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'DM Sans', sans-serif;
}

/* ═══════════════════════════════════════════
   RESET
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden;
  font-family: var(--sans); background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); }

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
#app { display: flex; flex-direction: column; height: 100vh; }

header {
  display: flex; align-items: center; height: 42px;
  padding: 0 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}

main { display: flex; flex: 1; overflow: hidden; }

#board-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 8px; min-width: 0;
}

aside {
  width: 300px; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  background: var(--panel);
}

#panel { flex: 1; overflow-y: auto; padding: 14px 16px; }

#status {
  padding: 8px 16px; font-family: var(--mono); font-size: 11px;
  color: var(--muted); border-top: 1px solid var(--border); flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
.brand { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: 0.04em; }
header nav { display: flex; margin-left: auto; height: 100%; }

.mtab {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--muted); background: none; border: none;
  padding: 0 12px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: color 0.12s;
}
.mtab:hover { color: var(--text); }
.mtab.on    { color: var(--text); border-bottom-color: var(--text); }

/* ═══════════════════════════════════════════
   BOARD SVG
   ═══════════════════════════════════════════ */
#goban { display: block; user-select: none; -webkit-user-select: none; }

/* ═══════════════════════════════════════════
   SIDEBAR WIDGETS
   ═══════════════════════════════════════════ */
.sec {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--dim); padding: 14px 0 6px;
}
.sec:first-child { padding-top: 2px; }

.dr {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 13px; padding: 2px 0;
}
.dr .l { color: var(--muted); }

.turn { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; }
.dot  { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; }
.dot.b { background: #111; border: 1px solid #555; }
.dot.w { background: #F0F0F0; border: 1px solid #666; }

/* ── Buttons ── */
.br { display: flex; gap: 2px; }

.b {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  padding: 6px 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.b:hover { background: var(--surface); color: var(--text); }
.b.on    { background: var(--text); color: var(--bg); border-color: var(--text); }
.b:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

.br .b { flex: 1; text-align: center; }

.bf {
  display: block; width: 100%; text-align: center; padding: 8px;
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--muted); cursor: pointer; margin-top: 8px;
}
.bf:hover { background: var(--surface); color: var(--text); }
.bf:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

.ba { display: flex; gap: 2px; margin-top: 8px; }
.ba .b { flex: 1; text-align: center; }

/* ── Kifu Table ── */
.kifu {
  font-family: var(--mono); font-size: 12px; width: 100%;
  border-collapse: collapse;
}
.kifu th {
  text-align: left; color: var(--dim); font-weight: 500;
  padding: 3px 5px; border-bottom: 1px solid var(--border); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.kifu td { padding: 2px 5px; color: var(--muted); }
.kifu tr:last-child td { color: var(--text); }

/* ── Analysis / Vis Tables ── */
.at {
  font-family: var(--mono); font-size: 12px; width: 100%;
  border-collapse: collapse;
}
.at th {
  text-align: left; color: var(--dim); font-weight: 500;
  padding: 3px 5px; border-bottom: 1px solid var(--border);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
}
.at td { padding: 3px 5px; }

/* ── Bar Chart ── */
.bar { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; margin-bottom: 3px; }
.bar-l { width: 30px; text-align: right; color: var(--muted); }
.bar-t { flex: 1; height: 10px; background: var(--bg); }
.bar-f { height: 100%; }
.bar-v { width: 32px; color: var(--dim); }

/* ── Thinking ── */
.thk { color: var(--warm); }
.hint { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 5px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <span class="brand">Scy Engine</span>
    <nav>
      <button class="mtab on" id="t-play" onclick="switchMode('play')">Play</button>
      <button class="mtab" id="t-analysis" onclick="switchMode('analysis')">Analysis</button>
      <button class="mtab" id="t-visualizer" onclick="switchMode('visualizer')">Visualize</button>
    </nav>
  </header>
  <main>
    <section id="board-area"><svg id="goban"></svg></section>
    <aside>
      <div id="panel"></div>
      <div id="status">Ready</div>
    </aside>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const EMPTY = 0, BLACK = 1, WHITE = 2;
const GTP_COLS = 'ABCDEFGHJKLMNOPQRST';
const PAD = 28;

let BOARD_SIZE   = 19;
let boardState   = [];
let currentPlayer = BLACK;
let moveCount    = 0;
let captures     = { black: 0, white: 0 };
let moveHistory  = [];
let lastMove     = null;
let gameOver     = false;
let isThinking   = false;
let simulations  = 100;
let currentMode  = 'play';
let analysisOverlay = [];
let visualizerSource = null;
let hoverPos     = null;

/* ═══════════════════════════════════════════════════════════════
   COORDINATE HELPERS
   ═══════════════════════════════════════════════════════════════ */
function rowColToGTP(r, c) { return GTP_COLS[c] + (BOARD_SIZE - r); }
function formatCoord(r, c) { return (r < 0 || c < 0) ? 'pass' : rowColToGTP(r, c); }
function playerName(p)     { return p === BLACK ? 'Black' : 'White'; }

/* ═══════════════════════════════════════════════════════════════
   SVG HELPERS
   ═══════════════════════════════════════════════════════════════ */
function sv(tag, a) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in a) e.setAttribute(k, a[k]);
  return e;
}

function sText(x, y, str, opts) {
  const o = opts || {};
  const e = sv('text', {
    x: x, y: y,
    'text-anchor':       o.anchor   || 'middle',
    'dominant-baseline': o.baseline || 'central',
    'font-family':       "'JetBrains Mono', monospace",
    'font-size':         o.size     || 10,
    'font-weight':       o.weight   || 400,
    fill:                o.fill     || '#7D8590',
    'pointer-events':    'none'
  });
  if (o.stroke) {
    e.setAttribute('stroke',      o.stroke);
    e.setAttribute('stroke-width', o.strokeW || 2.5);
    e.setAttribute('paint-order', 'stroke fill');
  }
  e.textContent = str;
  return e;
}

/* ═══════════════════════════════════════════════════════════════
   HEAT MAP — MCTS visit density overlay
   ═══════════════════════════════════════════════════════════════ */
function heatRGB(wr) {
  // #3F88A8 (cool, low wr) → #CF5C36 (warm, high wr)
  var t = Math.max(0, Math.min(1, wr));
  return 'rgb(' +
    Math.round(63  + (207-63)  * t) + ',' +
    Math.round(136 + (92-136)  * t) + ',' +
    Math.round(168 + (54-168)  * t) + ')';
}

function renderHeat(orig, fs) {
  if (!analysisOverlay.length) return;
  var svg = document.getElementById('goban');
  var maxV = 1;
  for (var i = 0; i < analysisOverlay.length; i++)
    if (analysisOverlay[i].visits > maxV) maxV = analysisOverlay[i].visits;

  for (var i = 0; i < analysisOverlay.length; i++) {
    var m  = analysisOverlay[i];
    var cx = orig + m.col * fs;
    var cy = orig + m.row * fs;
    // radius ∝ √(visits / max)
    var norm = Math.sqrt(m.visits / maxV);
    var r    = fs * 0.46 * Math.max(0.28, norm);
    var col  = heatRGB(m.win_rate);

    svg.appendChild(sv('circle', {
      cx: cx, cy: cy, r: r,
      fill: col, opacity: 0.55, 'pointer-events': 'none'
    }));

    // labelled text on top candidates
    if (i < 7) {
      var fz = Math.max(8, fs * 0.30);
      svg.appendChild(sText(cx, cy - 1,
        (m.win_rate * 100).toFixed(1),
        { size: fz, weight: 600, fill: '#FFF', stroke: 'rgba(0,0,0,0.55)', strokeW: 2.5 }
      ));
      if (fs > 22) {
        svg.appendChild(sText(cx, cy + fz * 0.85,
          String(m.visits),
          { size: Math.max(7, fs * 0.22), fill: 'rgba(255,255,255,0.55)' }
        ));
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   GOBAN RENDERING
   ═══════════════════════════════════════════════════════════════ */
function metrics() {
  var a = document.getElementById('board-area');
  var av = Math.min(a.clientWidth - 16, a.clientHeight - 16);
  var tot = Math.max(360, Math.min(700, av));
  var fs  = (tot - 2 * PAD) / (BOARD_SIZE - 1);
  return { tot: tot, fs: fs, o: PAD };
}

function hoshi() {
  if (BOARD_SIZE === 19) return [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  if (BOARD_SIZE === 13) return [[3,3],[3,9],[6,6],[9,3],[9,9]];
  if (BOARD_SIZE === 9)  return [[2,2],[2,6],[4,4],[6,2],[6,6]];
  return [];
}

function renderGoban() {
  var svg = document.getElementById('goban');
  var m   = metrics();
  var tot = m.tot, fs = m.fs, o = m.o;
  var end = o + (BOARD_SIZE - 1) * fs;

  svg.setAttribute('width',   tot);
  svg.setAttribute('height',  tot);
  svg.setAttribute('viewBox', '0 0 ' + tot + ' ' + tot);
  svg.innerHTML = '';

  // background
  svg.appendChild(sv('rect', { x:0, y:0, width:tot, height:tot, fill:'#D4A843' }));

  // grid
  for (var i = 0; i < BOARD_SIZE; i++) {
    var p = o + i * fs;
    svg.appendChild(sv('line', { x1:p, y1:o, x2:p, y2:end, stroke:'#111', 'stroke-width':1, 'shape-rendering':'crispEdges' }));
    svg.appendChild(sv('line', { x1:o, y1:p, x2:end, y2:p, stroke:'#111', 'stroke-width':1, 'shape-rendering':'crispEdges' }));
  }

  // star points
  var stars = hoshi();
  for (var i = 0; i < stars.length; i++) {
    svg.appendChild(sv('circle', { cx: o + stars[i][1] * fs, cy: o + stars[i][0] * fs, r: 2.5, fill: '#111' }));
  }

  // coordinates (A–T skip I, 1–19)
  for (var i = 0; i < BOARD_SIZE; i++) {
    var p = o + i * fs;
    svg.appendChild(sText(p, o - 13,   GTP_COLS[i]));
    svg.appendChild(sText(p, end + 14,  GTP_COLS[i]));
    svg.appendChild(sText(o - 15,   p,  String(BOARD_SIZE - i), { anchor: 'end' }));
    svg.appendChild(sText(end + 15, p,  String(BOARD_SIZE - i), { anchor: 'start' }));
  }

  // stones
  var sr = fs * 0.47;
  for (var r = 0; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      var s = boardState[r] ? boardState[r][c] : EMPTY;
      if (s === EMPTY) continue;
      var cx = o + c * fs, cy = o + r * fs;
      if (s === BLACK) {
        svg.appendChild(sv('circle', { cx:cx, cy:cy, r:sr, fill:'#111' }));
      } else {
        svg.appendChild(sv('circle', { cx:cx, cy:cy, r:sr, fill:'#F0F0F0', stroke:'#444', 'stroke-width':1 }));
      }
    }
  }

  // last-move marker (contrasting dot)
  if (lastMove && lastMove.row >= 0 && lastMove.col >= 0) {
    var lx = o + lastMove.col * fs;
    var ly = o + lastMove.row * fs;
    var ls = boardState[lastMove.row][lastMove.col];
    svg.appendChild(sv('circle', {
      cx:lx, cy:ly, r: fs * 0.14,
      fill: ls === BLACK ? '#F0F0F0' : '#111', opacity: 0.8
    }));
  }

  // MCTS density overlay
  renderHeat(o, fs);

  // ghost stone (re-draw if mouse was hovering)
  if (hoverPos) drawGhost(hoverPos.row, hoverPos.col, o, fs);

  // transparent hit-area for mouse events
  var hit = sv('rect', { x:0, y:0, width:tot, height:tot, fill:'transparent', cursor:'crosshair' });
  hit.addEventListener('mousemove', function(e) {
    var rect = svg.getBoundingClientRect();
    var col = Math.round((e.clientX - rect.left - o) / fs);
    var row = Math.round((e.clientY - rect.top  - o) / fs);
    onHover(row, col, o, fs);
  });
  hit.addEventListener('mouseleave', function() { clearGhost(); });
  hit.addEventListener('click', function(e) {
    var rect = svg.getBoundingClientRect();
    var col = Math.round((e.clientX - rect.left - o) / fs);
    var row = Math.round((e.clientY - rect.top  - o) / fs);
    if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) handleClick(row, col);
  });
  svg.appendChild(hit);
}

/* ═══════════════════════════════════════════════════════════════
   GHOST STONE
   ═══════════════════════════════════════════════════════════════ */
function onHover(r, c, o, fs) {
  if (isThinking || gameOver) { clearGhost(); return; }
  if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) { clearGhost(); return; }
  if (!boardState[r] || boardState[r][c] !== EMPTY) { clearGhost(); return; }
  if (currentMode === 'play' && currentPlayer !== BLACK) { clearGhost(); return; }
  if (hoverPos && hoverPos.row === r && hoverPos.col === c) return;
  clearGhost();
  drawGhost(r, c, o, fs);
  hoverPos = { row: r, col: c };
}

function drawGhost(r, c, o, fs) {
  var svg = document.getElementById('goban');
  var isB = currentMode === 'analysis' || currentPlayer === BLACK;
  svg.appendChild(sv('circle', {
    cx: o + c * fs, cy: o + r * fs, r: fs * 0.44,
    fill: isB ? '#111' : '#F0F0F0',
    stroke: isB ? 'none' : '#444', 'stroke-width': isB ? 0 : 1,
    opacity: 0.25, id: 'ghost', 'pointer-events': 'none'
  }));
}

function clearGhost() {
  var g = document.getElementById('ghost');
  if (g) g.remove();
  hoverPos = null;
}

/* ═══════════════════════════════════════════════════════════════
   BOARD CLICK
   ═══════════════════════════════════════════════════════════════ */
function handleClick(r, c) {
  if (isThinking) return;
  if (currentMode === 'play')     makeMove(r, c);
  if (currentMode === 'analysis') toggleStone(r, c);
}

function toggleStone(r, c) {
  if      (boardState[r][c] === EMPTY) boardState[r][c] = BLACK;
  else if (boardState[r][c] === BLACK) boardState[r][c] = WHITE;
  else                                 boardState[r][c] = EMPTY;
  analysisOverlay = [];
  updateUI();
}

/* ═══════════════════════════════════════════════════════════════
   STATE INIT
   ═══════════════════════════════════════════════════════════════ */
function initBoard() {
  boardState = [];
  for (var r = 0; r < BOARD_SIZE; r++) boardState.push(new Array(BOARD_SIZE).fill(EMPTY));
  currentPlayer = BLACK;
  moveCount = 0;
  captures = { black: 0, white: 0 };
  moveHistory = [];
  lastMove = null;
  analysisOverlay = [];
  gameOver = false;
}

/* ═══════════════════════════════════════════════════════════════
   API — NEW GAME
   ═══════════════════════════════════════════════════════════════ */
async function newGame() {
  isThinking = true; updateUI();
  try {
    var res = await fetch('/api/new_game', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ size: BOARD_SIZE })
    });
    var data = await res.json();
    initBoard();
    if (data.board_state)      boardState    = data.board_state;
    if (data.current_player != null) currentPlayer = data.current_player;
    if (data.captures)         captures      = data.captures;
  } catch (e) { setStatus('err: ' + e.message); }
  isThinking = false; updateUI();
}

/* ═══════════════════════════════════════════════════════════════
   API — PLAYER MOVE
   ═══════════════════════════════════════════════════════════════ */
async function makeMove(row, col) {
  if (gameOver || currentPlayer !== BLACK) return;
  if (boardState[row][col] !== EMPTY) return;
  isThinking = true;
  setStatus('<span class="thk">searching ' + simulations + ' sims…</span>');
  renderGoban(); renderPanel();

  try {
    var res = await fetch('/api/move', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ row: row, col: col, simulations: simulations })
    });
    var data = await res.json();
    if (!res.ok) {
      setStatus('illegal: ' + (data.error || ''));
      isThinking = false; updateUI(); return;
    }
    applyMove(data, row, col);
  } catch (e) { setStatus('network err'); }
  isThinking = false; updateUI();
}

function applyMove(data, pR, pC) {
  if (data.board_state)           boardState    = data.board_state;
  if (data.captures)              captures      = data.captures;
  if (data.move_count != null)    moveCount     = data.move_count;
  if (data.current_player != null) currentPlayer = data.current_player;
  if (data.game_over)             gameOver      = true;

  moveHistory.push({ num: moveHistory.length + 1, player: BLACK, row: pR, col: pC, pass: false });

  if (data.engine_move != null) {
    if (data.engine_move === 'pass') {
      moveHistory.push({ num: moveHistory.length + 1, player: WHITE, row: -1, col: -1, pass: true });
      lastMove = null;
    } else {
      var em = data.engine_move;
      moveHistory.push({ num: moveHistory.length + 1, player: WHITE, row: em[0], col: em[1], pass: false });
      lastMove = { row: em[0], col: em[1] };
    }
  } else {
    lastMove = { row: pR, col: pC };
  }

  if (data.game_over && data.score) {
    setStatus('game over — ' + (data.winner || '') +
      (data.score.black != null ? '  B:' + data.score.black + ' W:' + data.score.white : ''));
  }
}

/* ═══════════════════════════════════════════════════════════════
   API — PASS
   ═══════════════════════════════════════════════════════════════ */
async function passMove() {
  if (isThinking || gameOver) return;
  isThinking = true;
  setStatus('<span class="thk">searching…</span>');
  renderGoban(); renderPanel();

  try {
    var res = await fetch('/api/pass', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ simulations: simulations })
    });
    var data = await res.json();
    if (!res.ok) { setStatus('pass failed'); isThinking = false; updateUI(); return; }

    moveHistory.push({ num: moveHistory.length + 1, player: BLACK, row: -1, col: -1, pass: true });
    if (data.board_state)           boardState    = data.board_state;
    if (data.captures)              captures      = data.captures;
    if (data.move_count != null)    moveCount     = data.move_count;
    if (data.current_player != null) currentPlayer = data.current_player;

    if (data.engine_move != null) {
      if (data.engine_move === 'pass') {
        moveHistory.push({ num: moveHistory.length + 1, player: WHITE, row: -1, col: -1, pass: true });
        lastMove = null;
      } else {
        var em = data.engine_move;
        moveHistory.push({ num: moveHistory.length + 1, player: WHITE, row: em[0], col: em[1], pass: false });
        lastMove = { row: em[0], col: em[1] };
      }
    }
    if (data.game_over) { gameOver = true; setStatus('game over — ' + (data.winner || '')); }
  } catch (e) { setStatus('network err'); }
  isThinking = false; updateUI();
}

/* ═══════════════════════════════════════════════════════════════
   API — ANALYSIS
   ═══════════════════════════════════════════════════════════════ */
async function analysePosition() {
  isThinking = true;
  setStatus('<span class="thk">analysing ' + simulations + ' sims…</span>');
  renderPanel();

  try {
    var res = await fetch('/api/analyse', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ board_state: boardState, simulations: simulations })
    });
    var data = await res.json();
    if (data.candidates) {
      analysisOverlay = data.candidates.map(function(c) {
        return { row: c.move[0], col: c.move[1], win_rate: c.win_rate, visits: c.visits, ucb1: c.ucb1 };
      });
    }
  } catch (e) { setStatus('analysis err'); }
  isThinking = false; updateUI();
}

/* ═══════════════════════════════════════════════════════════════
   API — VISUALIZER (SSE)
   ═══════════════════════════════════════════════════════════════ */
function runVisualizer() {
  if (visualizerSource) { visualizerSource.close(); visualizerSource = null; }
  isThinking = true;
  setStatus('<span class="thk">mcts visualizer running…</span>');
  renderPanel();

  visualizerSource = new EventSource('/api/visualize?simulations=' + simulations);

  visualizerSource.onmessage = function(ev) {
    updateVizStats(JSON.parse(ev.data));
  };
  visualizerSource.addEventListener('done', function() {
    visualizerSource.close(); visualizerSource = null;
    isThinking = false; setStatus('visualizer done'); renderPanel();
  });
  visualizerSource.onerror = function() {
    visualizerSource.close(); visualizerSource = null;
    isThinking = false; setStatus('stream ended'); renderPanel();
  };
}

var lastVizRender = 0;
function updateVizStats(data) {
  var el;

  el = document.getElementById('v-total');
  if (el) el.textContent = data.total_simulations || 0;

  el = document.getElementById('v-best');
  if (el && data.best_move)
    el.textContent = formatCoord(data.best_move[0], data.best_move[1]) +
      ' ' + ((data.best_win_rate || 0) * 100).toFixed(1) + '%';

  if (data.top_moves) {
    analysisOverlay = data.top_moves.map(function(m) {
      return { row: m.move[0], col: m.move[1], win_rate: m.win_rate, visits: m.visits, ucb1: m.ucb1 };
    });
    // throttle board redraws to ~10fps during streaming
    var now = Date.now();
    if (now - lastVizRender > 100) { lastVizRender = now; renderGoban(); }
  }

  el = document.getElementById('v-tbody');
  if (el && data.top_moves) {
    el.innerHTML = data.top_moves.map(function(m) {
      return '<tr><td>' + formatCoord(m.move[0], m.move[1]) + '</td><td>' +
        m.visits + '</td><td>' + (m.win_rate * 100).toFixed(1) + '</td><td>' +
        m.ucb1.toFixed(3) + '</td></tr>';
    }).join('');
  }

  el = document.getElementById('v-bars');
  if (el && data.top_moves) {
    var maxV = Math.max.apply(null, data.top_moves.map(function(m) { return m.visits; }));
    if (maxV < 1) maxV = 1;
    el.innerHTML = data.top_moves.map(function(m) {
      var pct = (m.visits / maxV * 100).toFixed(1);
      var coord = formatCoord(m.move[0], m.move[1]);
      var c = heatRGB(m.win_rate);
      return '<div class="bar"><span class="bar-l">' + coord + '</span>' +
        '<div class="bar-t"><div class="bar-f" style="width:' + pct + '%;background:' + c + '"></div></div>' +
        '<span class="bar-v">' + m.visits + '</span></div>';
    }).join('');
  }
}

/* ═══════════════════════════════════════════════════════════════
   PANELS
   ═══════════════════════════════════════════════════════════════ */
function renderPanel() {
  var p = document.getElementById('panel');
  if      (currentMode === 'play')       p.innerHTML = playPanel();
  else if (currentMode === 'analysis')   p.innerHTML = analysisPanel();
  else                                   p.innerHTML = vizPanel();
}

function sizeBtn() {
  return [9, 13, 19].map(function(n) {
    return '<button class="b' + (BOARD_SIZE === n ? ' on' : '') +
      '" onclick="setBoardSize(' + n + ')">' + n + '×' + n + '</button>';
  }).join('');
}

function simBtn() {
  return [50, 100, 500, 1000].map(function(n) {
    return '<button class="b' + (simulations === n ? ' on' : '') +
      '" onclick="setSimulations(' + n + ')">' + (n >= 1000 ? (n/1000) + 'k' : n) + '</button>';
  }).join('');
}

/* ── Play ── */
function playPanel() {
  var tc = currentPlayer === BLACK ? 'b' : 'w';
  var tn = playerName(currentPlayer);
  var dis = isThinking || gameOver ? ' disabled' : '';
  var dis2 = isThinking ? ' disabled' : '';

  // kifu: paired move list
  var kifu = '';
  if (moveHistory.length === 0) {
    kifu = '<div class="hint">No moves</div>';
  } else {
    kifu = '<table class="kifu"><thead><tr><th>#</th><th>B</th><th>W</th></tr></thead><tbody>';
    for (var i = 0; i < moveHistory.length; i += 2) {
      var bm = moveHistory[i];
      var wm = i + 1 < moveHistory.length ? moveHistory[i + 1] : null;
      var n  = Math.floor(i / 2) + 1;
      var bc = bm.pass ? 'pass' : formatCoord(bm.row, bm.col);
      var wc = wm ? (wm.pass ? 'pass' : formatCoord(wm.row, wm.col)) : '';
      kifu += '<tr><td>' + n + '</td><td>' + bc + '</td><td>' + wc + '</td></tr>';
    }
    kifu += '</tbody></table>';
  }

  return '' +
    '<div class="sec">Board</div>' +
    '<div class="br">' + sizeBtn() + '</div>' +

    '<div class="sec">Simulations</div>' +
    '<div class="br">' + simBtn() + '</div>' +

    '<div class="sec">Position</div>' +
    '<div class="turn"><div class="dot ' + tc + '"></div>' + tn + ' to play</div>' +
    '<div style="margin-top:5px">' +
      '<div class="dr"><span class="l">Move</span><span>' + moveCount + '</span></div>' +
      '<div class="dr"><span class="l">B captures</span><span>' + (captures.black || 0) + '</span></div>' +
      '<div class="dr"><span class="l">W captures</span><span>' + (captures.white || 0) + '</span></div>' +
    '</div>' +

    '<div class="ba">' +
      '<button class="b"' + dis + ' onclick="passMove()">Pass</button>' +
      '<button class="b"' + dis2 + ' onclick="if(confirm(\'Resign?\'))newGame()">Resign</button>' +
      '<button class="b"' + dis2 + ' onclick="newGame()">New</button>' +
    '</div>' +

    '<div class="sec">Kifu</div>' +
    '<div style="max-height:200px;overflow-y:auto">' + kifu + '</div>';
}

/* ── Analysis ── */
function analysisPanel() {
  var rows = '';
  for (var i = 0; i < analysisOverlay.length; i++) {
    var m = analysisOverlay[i];
    rows += '<tr><td>' + (i+1) + '</td><td>' + formatCoord(m.row, m.col) +
      '</td><td>' + m.visits + '</td><td>' + (m.win_rate * 100).toFixed(1) +
      '</td><td>' + (m.ucb1 ? m.ucb1.toFixed(3) : '—') + '</td></tr>';
  }

  return '' +
    '<div class="sec">Board</div>' +
    '<div class="br">' + sizeBtn() + '</div>' +

    '<div class="sec">Simulations</div>' +
    '<div class="br">' + simBtn() + '</div>' +

    '<button class="bf"' + (isThinking ? ' disabled' : '') + ' onclick="analysePosition()">' +
      (isThinking ? 'analysing…' : 'Analyse Position') +
    '</button>' +
    '<div class="hint">Click intersections to place / remove stones</div>' +

    (rows ?
      '<div class="sec">Candidates</div>' +
      '<table class="at"><thead><tr><th>#</th><th>Move</th><th>Vis</th><th>Win%</th><th>UCB1</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>'
    : '');
}

/* ── Visualizer ── */
function vizPanel() {
  return '' +
    '<div class="sec">Simulations</div>' +
    '<div class="br">' + simBtn() + '</div>' +

    '<button class="bf"' + (isThinking ? ' disabled' : '') + ' onclick="runVisualizer()">' +
      (isThinking ? 'running…' : 'Run Visualizer') +
    '</button>' +

    '<div class="sec">Search</div>' +
    '<div class="dr"><span class="l">Total</span><span id="v-total">0</span></div>' +
    '<div class="dr"><span class="l">Best</span><span id="v-best">—</span></div>' +

    '<div class="sec">Top Nodes</div>' +
    '<table class="at"><thead><tr><th>Move</th><th>Vis</th><th>Win%</th><th>UCB1</th></tr></thead>' +
    '<tbody id="v-tbody"></tbody></table>' +

    '<div class="sec">Distribution</div>' +
    '<div id="v-bars"></div>';
}

/* ═══════════════════════════════════════════════════════════════
   MODE SWITCHING
   ═══════════════════════════════════════════════════════════════ */
function switchMode(mode) {
  if (mode === currentMode) return;
  if (visualizerSource) { visualizerSource.close(); visualizerSource = null; }
  isThinking = false;
  currentMode = mode;
  analysisOverlay = [];
  if (mode === 'play') { initBoard(); newGame(); return; }
  syncTabs(); updateUI();
}

function syncTabs() {
  document.querySelectorAll('.mtab').forEach(function(b) { b.classList.remove('on'); });
  var t = document.getElementById('t-' + currentMode);
  if (t) t.classList.add('on');
}

/* ═══════════════════════════════════════════════════════════════
   UI UPDATE
   ═══════════════════════════════════════════════════════════════ */
function updateUI() {
  renderGoban(); renderPanel(); syncTabs();
  if (!isThinking && !gameOver)
    setStatus('move ' + moveCount + ' · ' + playerName(currentPlayer).toLowerCase() + ' to play · ' + BOARD_SIZE + '×' + BOARD_SIZE + ' · ' + simulations + ' sims');
}

function setStatus(s) { document.getElementById('status').innerHTML = s; }
function setSimulations(n) { simulations = n; renderPanel(); }
function setBoardSize(n) { if (n !== BOARD_SIZE) { BOARD_SIZE = n; newGame(); } }

/* ═══════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('resize', function() { renderGoban(); });
initBoard(); renderGoban(); renderPanel(); newGame();
</script>
